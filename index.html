<!DOCTYPE html>
<html lang="fil">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ANSHS SakaySalaysay</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
nav{background:rgba(15,23,42,0.95);padding:15px 40px;display:flex;justify-content:space-between;width:100%;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
nav h2{color:#60a5fa;}
nav ul{list-style:none;display:flex;gap:20px;align-items:center;}
nav ul li a{color:#e2e8f0;text-decoration:none;font-weight:500;cursor:pointer;}
nav ul li a:hover{color:#60a5fa;}
.container{padding:30px 20px;max-width:800px;width:100%;}
.hidden{display:none;}
.banner{text-align:center;padding:50px 25px;background:linear-gradient(135deg,#1e40af,#2563eb);border-radius:25px;box-shadow:0 20px 40px rgba(0,0,0,0.4);margin-bottom:30px;}
.banner h1{font-size:2.5rem;margin-bottom:15px;}
.btn{padding:12px 28px;border:none;border-radius:40px;cursor:pointer;background:#f1f5f9;color:#1e3a8a;font-weight:600;margin-top:10px;}
.btn:hover{transform:translateY(-3px);}
input,select,textarea{width:100%;padding:12px;border-radius:10px;border:none;margin-bottom:15px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.card{background:#1e293b;padding:20px;border-radius:20px;box-shadow:0 15px 30px rgba(0,0,0,0.4);}
.card h3{color:#60a5fa;margin-bottom:8px;}
footer{text-align:center;padding:30px;margin-top:50px;color:#94a3b8;}
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;}
</style>
</head>
<body>

<nav>
<h2>ANSHS SakaySalaysay</h2>
<ul>
<li><a onclick="showPage('home')">Home</a></li>
<li><a onclick="showPage('write')">Write</a></li>
<li><a onclick="showPage('reviews')">Reviews</a></li>
<li id="userInfo"></li>
<li><a id="logoutBtn">Logout</a></li>
</ul>
</nav>

<div class="container">

<section id="loginPage">
<h2>Mag-login</h2>
<button class="btn" id="googleLogin">Mag-login gamit ang Google</button>
</section>

<section id="home" class="hidden">
<div class="banner">
<h1>SakaySalaysay</h1>
<p>Ibahagi ang tunay mong karanasan sa pagko-commute.</p>
<button class="btn" onclick="showPage('write')">Sumulat</button>
</div>
</section>

<section id="write" class="hidden">
<h2>Sumulat ng Review</h2>
<form id="reviewForm">
<input type="text" id="name" placeholder="Pangalan" required>
<select id="vehicle" required>
<option value="">Uri ng transportasyon</option>
<option>Dyip</option>
<option>Multicab</option>
</select>
<textarea id="message" placeholder="Isalaysay ang iyong karanasan" required></textarea>
<button type="submit" class="btn">Isumite</button>
</form>
</section>

<section id="reviews" class="hidden">
<h2>Mga Review</h2>
<div class="cards" id="reviewCards"></div>
</section>

</div>

<footer>© 2026 ANSHS SakaySalaysay</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyApFIiOFchkQfElCNH31wDLZ326aNz-8oA",
authDomain: "anshs-sakaysalaysay.firebaseapp.com",
projectId: "anshs-sakaysalaysay",
storageBucket: "anshs-sakaysalaysay.firebasestorage.app",
messagingSenderId: "857252004236",
appId: "1:857252004236:web:aafb9cc922ff5aa3e456a9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginPage = document.getElementById("loginPage");
const userInfo = document.getElementById("userInfo");

document.getElementById("googleLogin").addEventListener("click", () => {
const provider = new GoogleAuthProvider();
signInWithPopup(auth, provider).then(()=>{
location.reload(); // SAFARI FIX
});
});

document.getElementById("logoutBtn").addEventListener("click", ()=>{
signOut(auth).then(()=>location.reload());
});

onAuthStateChanged(auth, (user) => {
if (user) {
loginPage.classList.add("hidden");
userInfo.innerText = user.displayName;
showPage("home");
} else {
loginPage.classList.remove("hidden");
document.querySelectorAll("section").forEach(sec=>{
if(sec.id !== "loginPage"){sec.classList.add("hidden");}
});
}
});

window.showPage = function(page){
document.querySelectorAll("section").forEach(sec=>sec.classList.add("hidden"));
document.getElementById(page).classList.remove("hidden");
}

const form = document.getElementById("reviewForm");
form.addEventListener("submit", async e=>{
e.preventDefault();
await addDoc(collection(db,"reviews"),{
name:document.getElementById("name").value,
vehicle:document.getElementById("vehicle").value,
message:document.getElementById("message").value,
date:new Date().toISOString()
});
form.reset();
alert("Review submitted!");
});

const reviewCards = document.getElementById("reviewCards");
const q = query(collection(db,"reviews"), orderBy("date","desc"));

onSnapshot(q, snapshot=>{
reviewCards.innerHTML="";
snapshot.forEach(doc=>{
const r = doc.data();
const card = document.createElement("div");
card.className="card";
card.innerHTML=`
<h3>${r.vehicle} Review</h3>
<p><strong>Pangalan:</strong> ${r.name}</p>
<p>${r.message}</p>
<small>${new Date(r.date).toLocaleString()}</small>
`;
reviewCards.appendChild(card);
});
});
</script>

</body>
</html>
